name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: install xvfb
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends xvfb
      - name: gofmt
        run: |
          if [ -n "$(gofmt -s -l .)" ]; then
            echo "Go code is not formatted:"
            gofmt -s -d -e .
            exit 1
          fi
      - name: build
        # vendor/ only holds init.go download helper, not a module vendor tree
        run: go build -mod=mod ./...
      - name: test
        run: go test -mod=mod ./... -count=1 -timeout=10m
